# alembic.ini — Configuración principal de Alembic para MicroTaller
# Ejecutar siempre desde: backend/
#   alembic revision --autogenerate -m "descripcion"
#   alembic upgrade head

[alembic]
# Ruta al directorio con env.py y las versiones
script_location = alembic

# Patrón para nombrar los archivos de migración
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Codificación del sistema de archivos
prepend_sys_path = .

[post_write_hooks]
# Sin hooks post-escritura por defecto

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
