services:
  api:
    build: ../backend
    container_name: microtaller_api
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=microtaller
      - DB_USER=microtaller
      - DB_PASSWORD=microtaller
      - DEBUG=false
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"